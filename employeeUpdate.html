<!DOCTYPE html>

    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="stylesheet" href="CSS/header.css" />

    <title>Employee Update</title>
  </head>

  <body>
    <header class="header">
      <!-- Left Section-->
      <div class="left-section">
        <img class="PAH-logo" src="images/logo.jpg" alt="" />
        <p id="logo-title">Paws and Hearts</p>
      </div>

      <!-- Middle Section -->
      <div class="middle-section"></div>

      <!-- Right section -->
      <div class="right-section"></div>
    </header>

    <main>
      <!-- Update Medical Record -->
      <h2>Update Employee</h2>
      <form id="updateEmployee">
        <label for="employeeID">Employee ID:</label>
        <input
          type="number"
          id="employeeID"
          name="employeeID"
          placeholder="Enter employee ID"
          min="1"
        />

        <br />
        <label for="employeeWage">Updated Wage:</label>
        <input
          type="number"
          id="employeeWage"
          name="employeeWage"
          placeholder="Enter employee Wage"
          min="1"
        />

        <br />
        <label for="employeePosition">Updated Position:</label>
        <input
          type="text"
          id="employeePosition"
          name="employeePosition"
          placeholder="Enter employee position"
        />

        <br />
        <label for="employeeSID">Updated SID:</label>
        <input
          type="number"
          id="employeeSID"
          name="employeeSID"
          placeholder="Enter employee SID"
          min="1"
        />

        <br />
        <br />
        <button type="button" onclick="updateEmployee()">Update</button>
      </form>

        function updateEmployee() {

      </script>
    </main>
  </body>
</html>
