<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts (Include your font links here) -->

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="stylesheet" href="CSS/header.css" />

    <title>MR Insert</title>
  </head>

  <body>
    <header class="header">
      <!-- Left Section-->
      <div class="left-section">
        <img class="PAH-logo" src="images/logo.jpg" alt="" />
        <p id="logo-title">Paws and Hearts</p>
      </div>

      <!-- Middle Section -->
      <div class="middle-section">
        <!-- Add content if needed -->
      </div>

      <!-- Right section -->
      <div class="right-section">
        <!-- Add content if needed -->
      </div>
    </header>

    <main>
      <h1>DISPLAY ANIMAL INFO HERE</h1>

      <!-- Insert Medical Record -->
      <h2>Insert Medical Record</h2>
      <form id="medicalRecordForm">
        <label for="employeeID">Employee ID:</label>
        <input
          type="number"
          id="employeeID"
          name="employeeID"
          placeholder="Enter employee ID"
          min="1"
        />

        <br />
        <label for="animalID">Animal ID:</label>
        <input
          type="number"
          id="animalID"
          name="animalID"
          placeholder="Enter animal ID"
          min="1"
        />

        <br />
        <label for="status">Status:</label>
        <select id="status" name="status">
          <option value="healthy">Healthy</option>
          <option value="sick">Sick</option>
        </select>

        <br />
        <label for="diagnosis">Diagnosis:</label>
        <textarea
          id="diagnosis"
          name="diagnosis"
          placeholder="Enter diagnosis"
          rows="4"
          cols="50"
        ></textarea>

        <br />
        <br />
        <button type="button" onclick="submitMedicalRecord()">Submit</button>
      </form>

      <script>
        // Your JavaScript code here

        function submitMedicalRecord() {
          // Implement the logic for submitting medical records
          // Example: alert("Medical record submitted!");
        }

        // Add other functions for handling form actions
      </script>
    </main>
  </body>
</html>
