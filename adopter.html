<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="stylesheet" href="CSS/header.css" />

    <title>Adopter Console</title>
  </head>

  <body>
    <!-- <div id="logo">
      <img class="logo" src="Images/logo.jpg" alt="Paws and rescue logo" />
    </div> -->

    <header class="header">
      <!-- Left Section-->
      <div class="left-section">
        <img class="PAH-logo" src="images/logo.jpg" alt="" />
        <p id="logo-title">Paws and Hearts</p>
      </div>

      <!-- Middle Section -->
      <div class="middle-section"></div>

      <!-- Right section -->
      <div class="right-section"></div>
    </header>

    <main>
      <h2>Animal Shelter Adopter Search</h2>
      <div id="searchResults"></div>
      <!-- <p>
        Welcome! Please fill in the form of the animal your looking to adopt
      </p> -->
      <form id="searchForm">
        <label for="animalType">Animal Type:</label>
        <select id="animalType" name="animalType">
          <option value="Bunny">Bunny</option>
          <option value="Cat">Cat</option>
          <option value="Dog">Dog</option>
          <!-- Add more options as needed -->
        </select>

        <br />
        <label for="age">Age:</label>
        <input
          type="number"
          id="age"
          name="age"
          placeholder="Enter maximum age"
          min="1"
          max="20"
        />

        <br />
        <label for="location">Location:</label>
        <select id="location" name="location">
          <option value="Shoreline">Shoreline</option>
          <option value="Lynwood">Lynwood</option>
          <option value="Bothell">Bothell</option>
          <!-- Add more options as needed -->
        </select>

        <br />
        <br />
        <button type="button" onclick="searchDatabase()">Search</button>
      </form>

      <div id="searchResults">
        <!-- Display search results here -->
      </div>

      <!-- Add this script after your existing script in the <head> or at the end of the <body> -->
      <script src="JS/adopter.js"></script>
    </main>
  </body>
</html>
