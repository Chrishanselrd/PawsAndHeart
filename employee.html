<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Employee Console</title>
  </head>

  <body>
    <header class="header">
      <!-- Left Section-->
      <div class="left-section">
        <img class="PAH-logo" src="images/logo.jpg" alt="" />
        <p id="logo-title">Paws and Hearts</p>
      </div>

      <!-- Middle Section -->
      <div class="middle-section"></div>

      <!-- Right section -->
      <div class="right-section"></div>
    </header>

    <main>
      <h1>Animal Shelter Employee Search</h1>
      <!-- Animal Search -->
      <h2>Animal search</h2>
      <form id="searchAnimal">
        <label for="employeeID">Employee ID:</label>
        <input
          type="number"
          id="employeeID"
          name="employeeID"
          placeholder="Enter employee ID"
          min="1"
        />

        <br />
        <label for="AnimalID">Animal ID:</label>
        <input
          type="number"
          id="animalID"
          name="animalID"
          placeholder="Enter animal ID"
          min="1"
        />

        <br />
        <br />
        <button type="button" onclick="searchAnimal()">Search</button>
      </form>

      <br />
      <br />
      <!-- Adopter Search -->
      <h2>Adopter Search</h2>
      <form id="searchAdopterForm">
        <label for="adopterID">Adopter ID:</label>
        <input
          type="number"
          id="adopterID"
          name="adopterID"
          placeholder="Enter adopter ID"
          min="1"
        />

        <br />
        <br />
        <button type="button" onclick="searchAdopter()">Search</button>
      </form>

      <script>
        function searchAnimal() {
          // Perform the search using JavaScript or make an AJAX request to a server
          // Update the #searchResults div with the search results
          // For simplicity, let's just alert a message for now
          alert("Search functionality is not implemented in this example.");
        }

        function searchAdopter() {
          // Perform the search using JavaScript or make an AJAX request to a server
          // Update the #searchResults div with the search results
          // For simplicity, let's just alert a message for now
          alert("Search functionality is not implemented in this example.");
        }
      </script>
    </main>
  </body>
</html>
