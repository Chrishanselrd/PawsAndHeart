<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts (Include your font links here) -->

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="stylesheet" href="CSS/header.css" />

    <title>AR Insert</title>
  </head>

  <body>
    <header class="header">
      <!-- Left Section-->
      <div class="left-section">
        <img class="PAH-logo" src="images/logo.jpg" alt="" />
        <p id="logo-title">Paws and Hearts</p>
      </div>

      <!-- Middle Section -->
      <div class="middle-section">
        <!-- Add content if needed -->
      </div>

      <!-- Right section -->
      <div class="right-section">
        <!-- Add content if needed -->
      </div>
    </header>

    <main>
      <h1>Insert Animal</h1>
      <form id="animalInsertForm">
        <label for="name">Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter name"
          required
        />

        <label for="age">Age:</label>
        <input
          type="number"
          id="age"
          name="age"
          placeholder="Enter age"
          required
        />

        <label for="breed">Breed:</label>
        <input
          type="text"
          id="breed"
          name="breed"
          placeholder="Enter breed"
          required
        />

        <label for="animalType">Animal Type:</label>
        <select id="animalType" name="animalType">
          <option value="Bunny">Bunny</option>
          <option value="Cat">Cat</option>
          <option value="Dog">Dog</option>
          <!-- Add more options as needed -->
        </select>

        <label for="shelterID">Shelter ID:</label>
        <input
          type="number"
          id="shelterID"
          name="shelterID"
          placeholder="Enter shelter ID"
          required
        />

        <button type="button" onclick="insertAnimalRecord()">
          Insert Record
        </button>
      </form>

      <script>
        function insertAnimalRecord() {}
      </script>
    </main>
  </body>
</html>
