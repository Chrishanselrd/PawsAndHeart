<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts (Include your font links here) -->

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="stylesheet" href="CSS/header.css" />

    <title>Shelter Insert</title>
  </head>

  <body>
    <header class="header">
      <!-- Left Section-->
      <div class="left-section">
        <img class="PAH-logo" src="images/logo.jpg" alt="" />
        <p id="logo-title">Paws and Hearts</p>
      </div>

      <!-- Middle Section -->
      <div class="middle-section">
        <!-- Add content if needed -->
      </div>

      <!-- Right section -->
      <div class="right-section">
        <!-- Add content if needed -->
      </div>
    </header>

    <main>
      <h1>Insert Shelter</h1>
      <form id="shelterInsertForm">
        <label for="shelterName">Name:</label>
        <input
          type="text"
          id="shelterName"
          name="shelterName"
          placeholder="Enter shelter name"
          required
        />

        <label for="shelterLocation">Location:</label>
        <input
          type="text"
          id="shelterLocation"
          name="shelterLocation"
          placeholder="Enter shelter location"
          required
        />

        <button type="button" onclick="insertShelter()">Insert Shelter</button>
      </form>

      <script>
        function insertShelter() {}
      </script>
    </main>
  </body>
</html>
