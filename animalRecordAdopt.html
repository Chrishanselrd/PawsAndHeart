<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="stylesheet" href="CSS/header.css" />

    <title>Adopt Animal</title>
  </head>

  <body>
    <header class="header">
      <!-- Left Section-->
      <div class="left-section">
        <img class="PAH-logo" src="images/logo.jpg" alt="" />
        <p id="logo-title">Paws and Hearts</p>
      </div>

      <!-- Middle Section -->
      <div class="middle-section"></div>

      <!-- Right section -->
      <div class="right-section"></div>
    </header>

    <main>
      <h1>Adoption Form</h1>

      <form id="adoptForm">
        <label for="adopterName">Adopter Name:</label>
        <input
          type="text"
          id="adopterName"
          name="adopterName"
          placeholder="Adopter Name"
        />

        <br />
        <label for="adopterAge">Adopter Age:</label>
        <input
          type="number"
          id="adopterAge"
          name="adopterAge"
          placeholder="Adopter Age"
          min="18"
        />

        <br />
        <label for="adopterAddress">Adopter Address:</label>
        <input
          type="text"
          id="adopterAddress"
          name="adopterAddress"
          placeholder="Adopter Address"
        />

        <br />
        <label for="adopterPhone">Phone number:</label>
        <input
          type="text"
          id="adopterPhone"
          name="adopterPhone"
          placeholder="Adopter Phone number"
        />

        <br />
        <label for="animalID">Animal ID:</label>
        <input
          type="number"
          id="animalID"
          name="animalID"
          placeholder="Animal ID"
          min="1"
        />

        <br />
        <br />
        <button type="button" onclick="adoptAnimal()">Adopt</button>
      </form>

      <script>
        function adoptAnimal() {
          // Perform the search using JavaScript or make an AJAX request to a server
          // Update the #searchResults div with the search results
          // For simplicity, let's just alert a message for now
          alert("Search functionality is not implemented in this example.");
        }
      </script>
    </main>
  </body>
</html>
