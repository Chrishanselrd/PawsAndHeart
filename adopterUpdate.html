<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="stylesheet" href="CSS/header.css" />

    <title>Adopter Update</title>
  </head>

  <body>
    <header class="header">
      <!-- Left Section-->
      <div class="left-section">
        <img class="PAH-logo" src="images/logo.jpg" alt="" />
        <p id="logo-title">Paws and Hearts</p>
      </div>

      <!-- Middle Section -->
      <div class="middle-section"></div>

      <!-- Right section -->
      <div class="right-section"></div>
    </header>

    <main>
      <!-- Update Medical Record -->
      <h2>Update Adopter</h2>
      <form id="updateAdopter">
        <label for="adopterID">Adopter ID:</label>
        <input
          type="number"
          id="adopterID"
          name="adopterID"
          placeholder="Enter adopter ID"
          min="1"
        />

        <br />
        <label for="adopterName">Updated Name:</label>
        <input
          type="text"
          id="adopterName"
          name="adopterName"
          placeholder="Enter adopter Name"
        />

        <br />
        <label for="adopterAge">Updated Age:</label>
        <input
          type="number"
          id="adopterAge"
          name="adopterAge"
          placeholder="Enter adopter Age"
          min="1"
        />

        <br />
        <label for="adopterAddress">Updated Address:</label>
        <input
          type="text"
          id="adopterAddress"
          name="adopterAddress"
          placeholder="Enter adopter address"
        />

        <br />
        <label for="adopterPhone">Updated Phone Number:</label>
        <input
          type="text"
          id="adopterPhone"
          name="adopterPhone"
          placeholder="Enter adopter phone number"
        />

        <br />
        <br />
        <button type="button" onclick="updateAdopter()">Update</button>
      </form>

      <script>
        function updateAdopter() {
          // Perform the search using JavaScript or make an AJAX request to a server
          // Update the #searchResults div with the search results
          // For simplicity, let's just alert a message for now
          alert("Search functionality is not implemented in this example.");
        }
      </script>
    </main>
  </body>
</html>
